<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Comparison Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; }

  /* Top bar */
  .topbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
  .topbar h1 { font-size: 16px; font-weight: 600; color: #58a6ff; white-space: nowrap; }
  .filter-group { display: flex; align-items: center; gap: 8px; }
  .filter-group label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  select, input[type="text"] {
    background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 10px;
    border-radius: 6px; font-size: 13px; outline: none;
  }
  select:focus, input:focus { border-color: #58a6ff; }
  .group-nav { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .group-nav span { font-size: 13px; color: #8b949e; }
  .nav-btn {
    background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 12px;
    border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) { background: #30363d; border-color: #58a6ff; }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Sort bar */
  .sortbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 8px 24px; display: flex; align-items: center; gap: 12px; }
  .sort-chip {
    background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 4px 10px;
    border-radius: 20px; cursor: pointer; font-size: 12px; transition: all 0.15s;
  }
  .sort-chip:hover, .sort-chip.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; }

  /* Main content */
  .main { padding: 24px; max-width: 1600px; margin: 0 auto; }

  /* Prompt section */
  .prompt-box {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px 20px;
    margin-bottom: 20px; line-height: 1.6;
  }
  .prompt-label { font-size: 11px; color: #58a6ff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .prompt-text { font-size: 14px; color: #c9d1d9; }

  /* Group meta */
  .group-meta { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .meta-tag {
    background: #1f2937; border: 1px solid #30363d; padding: 4px 10px;
    border-radius: 6px; font-size: 12px; color: #8b949e;
  }
  .meta-tag strong { color: #c9d1d9; }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    overflow: hidden; transition: all 0.2s;
  }
  .card:hover { border-color: #58a6ff; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .card.rank-1 { border-color: #f0b429; }
  .card.rank-1 .rank-badge { background: #f0b429; color: #000; }
  .card.rank-2 { border-color: #8b949e; }
  .card.rank-2 .rank-badge { background: #8b949e; color: #000; }
  .card.rank-3 { border-color: #cd7f32; }
  .card.rank-3 .rank-badge { background: #cd7f32; color: #000; }

  .card-img-wrap {
    position: relative; width: 100%; aspect-ratio: 1; background: #0d1117;
    display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer;
  }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.3s; }
  .card-img-wrap:hover img { transform: scale(1.05); }
  .rank-badge {
    position: absolute; top: 8px; left: 8px; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700; background: #21262d; color: #8b949e;
  }

  .card-info { padding: 12px 14px; }
  .model-name { font-size: 14px; font-weight: 600; color: #e1e4e8; margin-bottom: 8px; }
  .scores { display: flex; gap: 12px; flex-wrap: wrap; }
  .score-item { font-size: 12px; color: #8b949e; }
  .score-item .val { color: #58a6ff; font-weight: 600; font-size: 14px; }
  .score-bar { height: 4px; background: #21262d; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    z-index: 1000; align-items: center; justify-content: center; cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
  .lightbox-info { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 14px; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 8px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: #8b949e; }
  .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: #c9d1d9; }

  /* Keyboard hint */
  .kbd-hint { position: fixed; bottom: 12px; right: 16px; font-size: 11px; color: #484f58; }
  kbd { background: #21262d; border: 1px solid #30363d; padding: 1px 5px; border-radius: 3px; font-family: inherit; }
</style>

function loadData() {
  DATA = INLINE_DATA;
  buildGroups();
  populateFilters();
  applyFilters();
}

function buildGroups() {
  const map = new Map();
  for (const d of DATA) {
    const key = `${d.task}||${d.category}||${d.image_id}`;
    if (!map.has(key)) {
      map.set(key, {
        key,
        task: d.task,
        category: d.category,
        image_id: d.image_id,
        prompt: d.prompt,
        items: []
      });
    }
    map.get(key).items.push(d);
  }
  groups = [...map.values()];
  // Sort groups by task then category
  groups.sort((a, b) => (a.task + a.category).localeCompare(b.task + b.category));
}

function populateFilters() {
  const tasks = [...new Set(DATA.map(d => d.task))].sort();
  const cats = [...new Set(DATA.map(d => d.category).filter(Boolean))].sort();

  const taskSel = document.getElementById('filterTask');
  tasks.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = formatTask(t); taskSel.appendChild(o); });

  const catSel = document.getElementById('filterCat');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });
}

function formatTask(t) {
  return t.replace(/^generation_/, '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getScoreColor(score) {
  if (score >= 0.7) return '#3fb950';
  if (score >= 0.4) return '#d29922';
  return '#f85149';
}

function applyFilters() {
  const task = document.getElementById('filterTask').value;
  const cat = document.getElementById('filterCat').value;
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  filteredGroups = groups.filter(g => {
    if (task && g.task !== task) return false;
    if (cat && g.category !== cat) return false;
    if (search) {
      const haystack = (g.prompt + ' ' + g.items.map(i => i.model_name).join(' ')).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  currentIdx = 0;
  renderCurrent();
}

function sortItems(items) {
  const sorted = [...items];
  switch (currentSort) {
    case 'rank':
      sorted.sort((a, b) => (a.other_scores.new_rank || 99) - (b.other_scores.new_rank || 99));
      break;
    case 'final_score_desc':
      sorted.sort((a, b) => b.final_score - a.final_score);
      break;
    case 'final_score_asc':
      sorted.sort((a, b) => a.final_score - b.final_score);
      break;
    case 'model':
      sorted.sort((a, b) => a.model_name.localeCompare(b.model_name));
      break;
  }
  return sorted;
}

function renderCurrent() {
  const main = document.getElementById('mainContent');
  const counter = document.getElementById('groupCounter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  if (filteredGroups.length === 0) {
    main.innerHTML = '<div class="empty-state"><h2>No matching groups</h2><p>Try adjusting your filters.</p></div>';
    counter.textContent = '0 / 0';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  counter.textContent = `${currentIdx + 1} / ${filteredGroups.length}`;
  prevBtn.disabled = currentIdx === 0;
  nextBtn.disabled = currentIdx === filteredGroups.length - 1;

  const g = filteredGroups[currentIdx];
  const sorted = sortItems(g.items);

  let html = '';

  // Prompt
  html += `<div class="prompt-box">
    <div class="prompt-label">Prompt</div>
    <div class="prompt-text">${escapeHtml(g.prompt || '(no prompt)')}</div>
  </div>`;

  // Meta tags
  html += `<div class="group-meta">
    <span class="meta-tag">Task: <strong>${formatTask(g.task)}</strong></span>
    ${g.category ? `<span class="meta-tag">Category: <strong>${g.category}</strong></span>` : ''}
    <span class="meta-tag">Image ID: <strong>${g.image_id}</strong></span>
    <span class="meta-tag">Candidates: <strong>${g.items.length}</strong></span>
  </div>`;

  // Cards
  html += '<div class="cards-grid">';
  for (const item of sorted) {
    const rank = item.other_scores.new_rank || '-';
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const imgUrl = item._deploy_img || item._local_img || item.predictions?.[0]?.url?.[0] || '';
    const fs = item.final_score;
    const os = item.other_scores.original_score;

    html += `<div class="card ${rankClass}">
      <div class="card-img-wrap" onclick="openLightbox('${escapeAttr(imgUrl)}', '${escapeAttr(item.model_name)} (Rank #${rank})')">
        ${imgUrl ? `<img src="${escapeAttr(imgUrl)}" alt="${escapeAttr(item.model_name)}" loading="lazy">` : '<span style="color:#484f58">No image</span>'}
        <span class="rank-badge">#${rank}</span>
      </div>
      <div class="card-info">
        <div class="model-name">${escapeHtml(item.model_name)}</div>
        <div class="scores">
          <div class="score-item">Final: <span class="val">${fs.toFixed(3)}</span></div>
          <div class="score-item">Original: <span class="val">${os.toFixed(3)}</span></div>
        </div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${fs * 100}%;background:${getScoreColor(fs)}"></div></div>
      </div>
    </div>`;
  }
  html += '</div>';

  main.innerHTML = html;
  main.scrollTo({ top: 0 });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escapeHtml(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function escapeAttr(s) { return s ? s.replace(/'/g, "\\'").replace(/"/g, '&quot;') : ''; }

function openLightbox(url, info) {
  if (!url) return;
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightboxInfo').textContent = info;
  document.getElementById('lightbox').classList.add('open');
}

document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});

// Event listeners
document.getElementById('filterTask').addEventListener('change', applyFilters);
document.getElementById('filterCat').addEventListener('change', applyFilters);
document.getElementById('searchInput').addEventListener('input', applyFilters);

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentIdx > 0) { currentIdx--; renderCurrent(); }
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentIdx < filteredGroups.length - 1) { currentIdx++; renderCurrent(); }
});

// Sort chips
document.querySelectorAll('.sort-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentSort = chip.dataset.sort;
    renderCurrent();
  });
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') { document.getElementById('prevBtn').click(); }
  if (e.key === 'ArrowRight') { document.getElementById('nextBtn').click(); }
  if (e.key === 'Escape') { document.getElementById('lightbox').classList.remove('open'); }
});

loadData();
</script>
